<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Unified Chat</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
    <div class="app-shell">
        <header class="hero">
            <div>
                <h1><img src="/static/favicon.ico" class="header-logo" alt="">Unified Chat</h1>
            </div>
            <div class="hero-actions">
                <a class="ghost-button" href="/auth/youtube/start">Connect YouTube</a>
                <a class="ghost-button" href="/auth/kick/start">Connect Kick</a>
                {% if auth_enabled %}
                <form method="post" action="/logout" class="inline-form">
                    <button class="ghost-button" type="submit">Log Out</button>
                </form>
                {% endif %}
            </div>
        </header>

        <main class="layout-grid">
            <section class="panel controls-panel">
                <div class="panel-header">
                    <h2>Filter</h2>
                </div>
                <div class="filter-row">
                    <button class="filter-button active" data-platform="twitch" type="button">Twitch</button>
                    <button class="filter-button active" data-platform="youtube" type="button">YouTube</button>
                    <button class="filter-button active" data-platform="kick" type="button">Kick</button>
                </div>
                <div class="panel-header">
                    <h2>Settings</h2>
                </div>
                <div class="filter-row">
                    <button id="clear-messages" class="filter-button clear-button" type="button">Clear chat</button>
                    <button id="toggle-platform-names" class="filter-button active" type="button">Platform</button>
                </div>
            </section>

            <section class="panel status-panel">
                <div class="panel-header">
                    <h2>Connector Status</h2>
                    <button id="refresh-status" class="ghost-button small-button" type="button">Refresh</button>
                </div>
                <div id="status-grid" class="status-grid"></div>
            </section>

            <section class="panel feed-panel">
                <div class="panel-header">
                    <h2>Unified Feed</h2>
                    <button id="popout-chat" class="ghost-button small-button" type="button" title="Pop out chat">⧉</button>
                </div>
                <div class="feed-wrapper">
                    <div id="feed" class="feed" aria-live="polite"></div>
                    <button id="scroll-bottom" class="scroll-bottom hidden" type="button" title="Scroll to bottom">↓</button>
                </div>
                <div id="emote-picker" class="emote-picker hidden">
                    <input id="emote-search" class="emote-search" type="text" placeholder="Search emotes...">
                    <div id="emote-grid" class="emote-grid"></div>
                </div>
                <form id="reply-form" class="reply-form-inline">
                    <input id="reply-message" name="message" type="text" maxlength="500"
                        placeholder="Reply to Twitch..." class="reply-input">
                    <button id="emote-toggle" class="emote-toggle" type="button" title="Emotes">😊</button>
                    <button type="submit" class="primary-button">Send</button>
                </form>
                <p id="reply-status" class="reply-status"></p>
            </section>
        </main>
    </div>

    <script>
        window.UNIFIED_CHAT_CONFIG = {
            appBaseUrl: {{ app_base_url | tojson }}
        };
    </script>
    <script src="{{ url_for('static', path='app.js') }}" defer></script>
</body>
</html>
