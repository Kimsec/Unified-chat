<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Unified Chat - Popout</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}?v={{ asset_version }}">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            padding: 0;
        }
        .app-shell {
            height: 100%;
            display: flex;
            flex-direction: column;
            max-width: none;
        }
        .feed-panel {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            border-radius: 0;
            border: none;
        }
        .feed {
            flex: 1 1 0;
            min-height: 0;
        }
    </style>
</head>
<body data-mode="popout">
    <div class="app-shell">
        <button id="alerts-unlock" class="alerts-unlock hidden" type="button"
            title="Browsers block sound until you interact with the page">&#128266; Enable alert sound</button>
        <section class="panel feed-panel">
            <div id="hype-train-bar" class="hype-train-bar hidden" role="status" aria-live="polite" aria-hidden="true">
                <div class="hype-train-info">
                    <span class="hype-train-label">Hype Train Lvl <span id="ht-level">1</span></span>
                    <span id="ht-progress-text"></span>
                </div>
                <div class="hype-train-track">
                    <div id="ht-fill" class="hype-train-fill"></div>
                </div>
            </div>
            <div id="poll-bar" class="poll-bar hidden" role="status" aria-live="polite" aria-hidden="true">
                <div class="poll-info">
                    <span id="poll-title" class="poll-title"></span>
                    <span id="poll-status"></span>
                </div>
                <div id="poll-choices" class="poll-choices"></div>
            </div>
            <div class="feed-wrapper">
                <div id="feed" class="feed" aria-live="polite"></div>
                <button id="scroll-bottom" class="scroll-bottom hidden" type="button" title="Scroll to bottom">↓</button>
            </div>
            <div id="emote-picker" class="emote-picker hidden">
                <input id="emote-search" class="emote-search" type="text" placeholder="Search emotes...">
                <div id="emote-grid" class="emote-grid"></div>
            </div>
            <div id="reply-context" class="reply-context hidden">
                <span id="reply-context-text"></span>
                <button id="reply-context-clear" type="button" title="Cancel reply">✕</button>
            </div>
            <form id="reply-form" class="reply-form-inline">
                <div class="reply-input-wrap">
                    <input id="reply-message" name="message" type="text" maxlength="500"
                        placeholder="Reply to Twitch..." class="reply-input">
                    <button id="reply-target-toggle" class="reply-target-toggle" type="button"
                        title="Choose where to send"></button>
                    <div id="reply-target-menu" class="reply-target-menu hidden">
                        <button class="reply-target-option" data-target="twitch" type="button">
                            <svg viewBox="0 0 256 268" aria-hidden="true"><path fill="#9146ff" d="M17.46 0L0 46.56v185.21h63.14V268h46.87l36.49-36.23h54.91L256 177.68V0H17.46zm23.07 23.07H232.9v143.14l-41.47 41.47h-69.15L85.79 244.2v-36.52H40.53V23.07zm69.15 104.55h23.07V69.26h-23.07v58.36zm63.14 0h23.07V69.26h-23.07v58.36z"/></svg>
                            Twitch</button>
                        <button class="reply-target-option" data-target="kick" type="button">
                            <img src="/static/kick-logo.ico" alt="">
                            Kick</button>
                        <button class="reply-target-option" data-target="all" type="button">
                            <span class="reply-target-all">ALL</span>
                            Both</button>
                    </div>
                </div>
                <button id="emote-toggle" class="emote-toggle" type="button" title="Emotes">😊</button>
                <button type="submit" class="primary-button">Send</button>
            </form>
            <p id="reply-status" class="reply-status"></p>
        </section>
        <div id="alert-frames" class="alert-frames" aria-hidden="true"></div>
    </div>

    <script>
        window.UNIFIED_CHAT_CONFIG = {
            appBaseUrl: {{ app_base_url | tojson }}
        };
    </script>
    <script src="{{ url_for('static', path='app.js') }}?v={{ asset_version }}" defer></script>
</body>
</html>
